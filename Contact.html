<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1>Send Me an Email!</h1>
            <div id="nav-container">
            <nav>
                <a href="index.html">Home</a>
                <a href="Projects.html">Projects</a>
                <a href="Future.html">Future</a>
            </nav>
            </div>
        </header>
        <main>
            <!-- Credit for form element: "Send Emails From a HTML Contact Form" by How to Become a Developer (YouTube)-->
            <form action="https://formspree.io/f/xjglayba" method="post">
                <div class="form-group">
                    <label for="name">Name: </label>
                    <input type="text" name="name" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email: </label>
                    <input type="email" name="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message: </label>
                    <textarea name="message" id="message" required></textarea>
                </div>
                <input type="submit" name="submit" id="submit" value="Submit">
            </form>



        </main>
        <footer>
            <p>Created by Grant Arbuckle</p>
            <p>Logo designed with AI (Credit: <a href="https://www.chatgpt.com">chatgpt.com</a>)</p>
            <p id="contact-me"><a href="Contact.html">Contact Me</a></p>
        </footer>
    </body>
